
name: Qiita Auto Scheduler

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  # 💡 Actionsのトークンにリポジトリへの書き込み権限を与える（勝手にコミットさせるために必要）
  contents: write

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run scheduler script
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: python publish.py

      # ✨ ここをプラグインに変更！勝手に権限使ってコミット＆プッシュしてくれます
      - name: Auto Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update article publish status [skip ci]"
          file_pattern: 'articles.yaml' # 変更を監視・コミットするファイル
